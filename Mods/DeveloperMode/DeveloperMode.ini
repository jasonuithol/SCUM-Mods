# DeveloperMode — who may run SCUM's developer-tier (#) admin commands.
#
# SCUM gives every command executor a tier (EExecutorStatus):
#   Regular     normal connected players (no admin rights)
#   Admin       AdminUser.ini admins
#   SuperAdmin  super admins
#   Elevated    users in the elevated_users table (e.g. via tools/elevate.py)
#   Developer   GamePires "developer" tier (empty on retail servers)
#
# For each tier, set ON to let that tier run developer-tier admin commands
# (e.g. #UpgradeBaseBuildingElementsWithinRadius), or OFF to deny it.
# Lines starting with # or ; are comments. Values: ON/OFF (also true/false, 1/0).
#
# This file is read once, at server start. Edit it, then restart the server.
# If this file is missing, the built-in defaults below are used.

Regular    = OFF
Admin      = ON
SuperAdmin = ON
Elevated   = ON
Developer  = ON
