# GarbageGoober category rules. Edit this file, then run  goober reload
# in chat (or restart) to apply. This is DATA, not code (no Lua here).
#
# HOW MATCHING WORKS
#   For each loose item the sorter walks `rules` top-to-bottom. A rule
#   matches when any token in its `match` list is found (case-insensitive,
#   substring) in the item's class name. The FIRST matching rule wins and
#   gives the item a category PATH (general -> specific). The sorter then
#   looks for a chest IN THE SAME FLAG whose name matches a path node,
#   most-specific node first, falling back toward the general end.
#   No rule matches => `default` below (or left in place if default is nil).
#
#   ORDER MATTERS: specific/override tokens must come before general ones
#   (e.g. _ammo before rifle so "rifle_ammo" sorts as Ammo). Rules are
#   evaluated in the order written here.
#
# THE TREE = SCUM's vendor structure: TRADER TYPE > TRADE CATEGORY, e.g.
#   Armorer > Ammo | RangedWeapon[ > sub-type] | RangedWeaponAccessories |
#             MeleeWeapon | Explosives
#   Bartender > Food | Drink | Alcohol      Doctor > FirstAid
#   Mechanic > Vehicles | Crafting          Harbourmaster > WaterVehicles | Fishing
#   GeneralGoods > Helmets Jackets Pants Tops Headwear Hands Face Feet
#                  Backpacks Armour Neckwaist Underwear Cosmetics Misc
#   Name a chest after a leaf ("Drink", "Ammo") for fine sorting, or after a
#   trader ("Bartender") to catch a whole group. Run  goober classes  to see
#   live class names + how each maps, and watch the sweep log's "unmapped".

default: [GeneralGoods, Misc]

rules:
  - path: [Mechanic, Crafting]
    match: [car_battery]
  - path: [Bartender, Food]
    match: [agaricus, bakingsoda]
